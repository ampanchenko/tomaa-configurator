     TOMAA — конфигуратор браслета. Код для вставки в Tilda.
     Блок «T123 · HTML» → вставить целиком.
     Адрес уже указан на GitHub Pages этого проекта.
     ============================================================ -->
<div style="width:100%;max-width:1180px;margin:0 auto">
  <iframe
    id="tomaa-cfg-frame"
    src="https://ampanchenko.github.io/tomaa-configurator/index.html"
    style="width:100%;border:0;display:block;min-height:780px"
    scrolling="no"
    loading="lazy"
    title="Конфигуратор браслета TOMAA"></iframe>
</div>
<script>
(function(){
  var f = document.getElementById('tomaa-cfg-frame');
  // авто-подгон высоты iframe под содержимое
  window.addEventListener('message', function(e){
    if(e && e.data && e.data.tomaaConfiguratorHeight){
      f.style.height = (e.data.tomaaConfiguratorHeight + 8) + 'px';
    }
  });
})();
</script>
