<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конфигуратор браслетов TOMAA</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ===== TOMAA configurator — redesign audit ===== */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600&display=swap');

:root{
  --ink:#14110f; --ink-soft:#6b6560; --mute:#a8a29b;
  --line:#e7e3dd; --line-soft:#f0ece6; --panel:#f5f2ed; --bg:#fbfaf7;
  --accent:#14110f; --accent-ink:#fff;
  --radius:18px; --radius-sm:11px;
  --font:'Montserrat',-apple-system,Arial,sans-serif;
  --display:'Montserrat',-apple-system,Arial,sans-serif; /* @kind font */
  --gold:radial-gradient(circle at 32% 26%,#edd28f,#c2933f 58%,#8a6322); /* @kind color */
  --silver:radial-gradient(circle at 32% 26%,#f6f7f9,#c4c7cc 58%,#8d9197); /* @kind color */
  --stage:radial-gradient(120% 90% at 50% 16%,#ffffff 0%,#f3eee7 64%,#e8e1d7 100%); /* @kind color */
  --pad:clamp(20px,2.4vw,34px);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:var(--font); color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
button{font-family:inherit}

/* ---------- audit chrome ---------- */
.audit-top{
  max-width:1140px; margin:0 auto; padding:30px var(--pad) 6px;
  display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;
}
.audit-kicker{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--mute);font-weight:600;margin:0 0 9px}
.audit-h1{font-family:var(--display);font-size:clamp(24px,3.1vw,34px);font-weight:600;letter-spacing:.01em;margin:0;line-height:1.08}
.audit-sub{font-size:14px;color:var(--ink-soft);margin:11px 0 0;max-width:540px;line-height:1.55}
.audit-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px}
.seg button{border:none;background:none;cursor:pointer;border-radius:999px;padding:9px 15px;font-size:12.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;display:inline-flex;align-items:center;gap:7px;transition:.16s}
.seg button.on{background:var(--ink);color:#fff}
.seg button:not(.on):hover{color:var(--ink)}
.seg svg{display:block}

.toggle-ann{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px 8px 12px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.toggle-ann .sw{width:34px;height:19px;border-radius:999px;background:#d8d3cc;position:relative;transition:.18s;flex:none}
.toggle-ann.on .sw{background:var(--ink)}
.toggle-ann .sw::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:.18s}
.toggle-ann.on .sw::after{left:17px}

/* ---------- frame / device ---------- */
.stagewrap{max-width:1140px;margin:18px auto 60px;padding:0 var(--pad);position:relative}
.device{position:relative;transition:max-width .35s cubic-bezier(.4,0,.2,1)}
.device.desktop{max-width:1080px;margin:0 auto}
.device.mobile{max-width:430px;margin:0 auto;background:#0d0b0a;border-radius:50px;padding:12px;box-shadow:0 36px 80px -34px rgba(20,17,15,.65)}
.device.mobile .app{border-radius:38px;border-color:transparent;box-shadow:none;height:clamp(600px,84vh,860px);overflow:hidden}
.notch{display:none}
.device.mobile .notch{display:flex;height:24px;align-items:center;justify-content:center}
.device.mobile .notch::before{content:"";width:116px;height:7px;border-radius:99px;background:#2a2624}

/* ---------- the app shell ---------- */
.app{
  background:#fff;border:1px solid var(--line);border-radius:calc(var(--radius) + 4px);
  box-shadow:0 1px 0 rgba(0,0,0,.02),0 30px 60px -38px rgba(20,17,15,.4);
  overflow:hidden;display:flex;flex-direction:column;position:relative;
}
.app-body{display:flex;align-items:stretch}
.device.mobile .app-body{flex-direction:column;flex:1;min-height:0;overflow:hidden}

/* ---------- stage ---------- */
.stage{
  position:relative;flex:0 0 47%;background:var(--stage);
  padding:26px 30px 22px;display:flex;flex-direction:column;
  border-right:1px solid var(--line-soft);
}
.device.mobile .stage{flex:none;border-right:none;border-bottom:1px solid var(--line-soft);position:static;z-index:6;padding:18px 18px 14px}
.stage-eyebrow{font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--mute);font-weight:600;margin:0 0 auto}
.stage-figure{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:8px 0;overflow:hidden;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent);mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent)}
.device.mobile .stage-figure{padding:14px 0;min-height:78px}
.bracelet-box{position:relative;width:150%;max-width:none}
.device.mobile .bracelet-box{width:128%;margin:0 auto}
.bracelet-img{width:100%;display:block;filter:drop-shadow(0 18px 22px rgba(20,17,15,.18))}
.bracelet-reflect{position:absolute;left:0;right:0;top:99%;width:100%;height:auto;opacity:.13;transform:scaleY(-1);transform-origin:top;
  -webkit-mask-image:linear-gradient(#000,transparent 62%);mask-image:linear-gradient(#000,transparent 62%);pointer-events:none;display:block}
.charm{position:absolute;top:46.5%;transform:translate(-50%,-50%) scale(.4);height:auto;
  filter:drop-shadow(0 6px 7px rgba(20,17,15,.28));opacity:0;animation:charmIn .42s cubic-bezier(.34,1.4,.5,1) forwards;
  transition:left .2s cubic-bezier(.4,0,.2,1),top .2s cubic-bezier(.4,0,.2,1);
  cursor:grab;touch-action:none;user-select:none;-webkit-user-drag:none;-webkit-tap-highlight-color:transparent}
.charm:hover{filter:drop-shadow(0 8px 10px rgba(20,17,15,.34))}
.charm.dragging{cursor:grabbing;z-index:6;animation:none;opacity:1;transform:translate(-50%,-50%) scale(1.06);filter:drop-shadow(0 12px 16px rgba(20,17,15,.42));transition:none}
@keyframes charmIn{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.charm.medallion{border-radius:50%;object-fit:cover;background:#fff;box-shadow:0 6px 7px rgba(20,17,15,.26),inset 0 0 0 2px rgba(255,255,255,.9),0 0 0 3px var(--ring,#c2933f)}

.stage-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px}
.plating{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px}
.plating button{border:none;background:none;cursor:pointer;border-radius:999px;padding:8px 13px 8px 9px;font-size:12px;font-weight:600;color:var(--ink-soft);display:inline-flex;align-items:center;gap:8px;letter-spacing:.02em;transition:.16s}
.plating button.on{background:var(--ink);color:#fff}
.plating.small button{padding:7px 11px 7px 8px;font-size:11.5px}
.plating.small button svg{display:block}
.plating .dot{width:16px;height:16px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.18)}
.plating.small .dot{width:13px;height:13px}
.plating .dot.gold{background:var(--gold)}.plating .dot.silver{background:var(--silver)}
.count-pill{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.04em;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px}
.count-pill b{color:var(--ink)}
.stage-legend{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;display:inline-flex;align-items:center;gap:7px}
.stage-legend .sp{width:18px;height:18px;border-radius:50%;background:#fff;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;flex:none}
.device.mobile .stage-legend{font-size:11px}

/* ---------- panel ---------- */
.panel{flex:1;min-width:0;display:flex;flex-direction:column;max-height:640px;overflow-y:auto;scrollbar-width:thin}
.device.mobile .panel{max-height:none;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel::-webkit-scrollbar{width:8px}.panel::-webkit-scrollbar-thumb{background:#e3ded7;border-radius:99px}
.step{padding:24px var(--pad) 6px;border-bottom:1px solid var(--line-soft)}
.step:last-of-type{border-bottom:none}
.step-head{display:flex;align-items:baseline;gap:11px;margin:0 0 16px;padding-right:30px}
.step-no{font-family:var(--display);font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);border-radius:7px;padding:3px 8px;letter-spacing:.04em}
.step-title{font-size:13px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;margin:0}
.step-hint{font-size:12px;color:var(--mute);margin-left:auto;font-weight:500;white-space:nowrap}

.field{margin-bottom:20px}
.field-lab{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:8px}
.field-lab .val{color:var(--ink);letter-spacing:.02em;text-transform:none;font-size:12.5px;font-weight:600}

/* material segmented */
.matseg{display:flex;gap:8px}
.matseg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:var(--radius-sm);padding:12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);transition:.16s}
.matseg button.on{border-color:var(--ink);color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.matseg button:not(.on):hover{border-color:#cfc9c1}

/* geometry cards */
.geoms{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.geom{position:relative;width:100%;border:1px solid var(--line);background:#fff;border-radius:var(--radius-sm);padding:13px 14px;cursor:pointer;text-align:left;transition:.16s;display:flex;flex-direction:column;gap:4px;justify-content:flex-start}
.geom:hover{border-color:#cfc9c1}
.geom.on{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.geom.soon{cursor:not-allowed;opacity:.62}
.geom .gi{display:flex;align-items:center;gap:9px;color:var(--ink)}
.geom .gi svg{display:block}
.geom .gl{font-size:13.5px;font-weight:600;line-height:1.25;padding-right:22px;text-wrap:pretty}
.geom .gsz{font-weight:500;color:var(--ink-soft);letter-spacing:.04em;white-space:nowrap;margin-left:5px}
.geom .gp{font-size:13px;font-weight:600;color:var(--ink);margin-top:auto;padding-top:6px}
.geom .badge{position:absolute;top:10px;right:10px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:#fff;background:var(--mute);border-radius:99px;padding:3px 7px}
.geom .check{position:absolute;top:11px;right:11px;width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;display:none;align-items:center;justify-content:center}
.geom.on .check{display:flex}

/* swatches */
.sws{display:flex;flex-wrap:wrap;gap:11px}
.sw{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);transition:.14s;padding:0;background-clip:padding-box}
.sw:hover{transform:translateY(-1px)}
.sw.on{border-color:var(--ink)}
.sw.on::after{content:"";position:absolute;inset:-7px;border-radius:50%;border:1px solid var(--line)}

/* finish selector for charm being added */
.finrow{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:16px;flex-wrap:wrap}
.finrow-lab{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:3px}
.finrow-hint{font-size:11.5px;color:var(--ink-soft);line-height:1.4;max-width:230px}

/* category chips */
.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:15px}
.cat{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s;letter-spacing:.01em}
.cat.on{background:var(--ink);border-color:var(--ink);color:#fff}
.cat:not(.on):hover{border-color:#cfc9c1;color:var(--ink)}

/* charm grid */
.charms{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.device.mobile .charms{grid-template-columns:repeat(3,1fr)}
.ccard{position:relative;border:1px solid var(--line);background:#fff;border-radius:var(--radius-sm);padding:8px 8px 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:.15s}
.ccard:hover{border-color:#cfc9c1;transform:translateY(-1px);box-shadow:0 10px 20px -14px rgba(20,17,15,.4)}
.ccard.on{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.ccard.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.ccard .ph{width:100%;aspect-ratio:1;border-radius:8px;background:var(--line-soft) center/cover;display:block}
.ccard .cn{font-size:10.5px;line-height:1.25;color:var(--ink-soft);font-weight:500;text-align:center;text-wrap:balance;min-height:2.5em;display:flex;align-items:center}
.ccard .cp{font-size:11px;font-weight:600;color:var(--ink);display:flex;align-items:baseline;gap:5px;justify-content:center}
.ccard .cp-old{font-size:9.5px;font-weight:500;color:var(--mute);text-decoration:line-through}
.ccard .add{position:absolute;top:7px;right:7px;width:23px;height:23px;border-radius:50%;background:#fff;border:1px solid var(--line);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:.15s}
.ccard.on .add{background:var(--ink);border-color:var(--ink);color:#fff}
.ccard .cut{position:absolute;top:7px;left:7px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center}
.ccard .cut svg{display:block}

/* placed tray */
.tray{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;min-height:4px}
.tray-empty{font-size:12px;color:var(--mute);font-weight:500}
.chip-charm{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 8px 4px 4px;font-size:11.5px;font-weight:600;color:var(--ink)}
.chip-charm img{width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--line-soft)}
.chip-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-fin{display:inline-flex;background:var(--panel);border-radius:999px;padding:2px;gap:1px}
.fdot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.16);transition:.14s}
.fdot.gold{background:var(--gold)}.fdot.silver{background:var(--silver)}
.fdot.on{border-color:var(--ink)}
.fdot:not(.on){opacity:.5}
.fdot:not(.on):hover{opacity:.85}
.chip-lvl{display:inline-flex;background:var(--panel);border-radius:999px;padding:2px;gap:1px}
.ldot{width:20px;height:20px;border-radius:50%;border:none;background:none;cursor:pointer;padding:0;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:.14s}
.ldot.on{background:var(--ink);color:#fff}
.ldot:not(.on):hover{color:var(--ink)}
.chip-charm .rm{border:none;background:none;cursor:pointer;color:var(--mute);width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex:none}
.chip-charm .rm:hover{background:var(--panel);color:var(--ink)}

/* ---------- bottom bar ---------- */
.bottombar{display:flex;align-items:center;gap:18px;padding:15px var(--pad);background:#fff;border-top:1px solid var(--line);position:sticky;bottom:0;z-index:7}
.device.mobile .bottombar{padding:13px 18px;box-shadow:0 -10px 24px -18px rgba(20,17,15,.5)}
.bb-summary{flex:1;min-width:0}
.bb-line{font-size:12px;color:var(--ink-soft);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bb-line b{color:var(--ink);font-weight:600}
.bb-price-wrap{display:flex;flex-direction:column;align-items:flex-end;line-height:1;gap:3px}
.bb-price-lab{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);font-weight:600}
.bb-price{font-family:var(--display);font-size:23px;font-weight:600;color:var(--ink)}
.cta{border:none;border-radius:999px;background:var(--accent);color:var(--accent-ink);cursor:pointer;
  font-size:14px;font-weight:600;letter-spacing:.02em;padding:15px 26px;display:inline-flex;align-items:center;gap:9px;transition:.16s;white-space:nowrap}
.cta:hover{transform:translateY(-1px);box-shadow:0 14px 26px -14px rgba(20,17,15,.6)}
.cta svg{display:block}
.device.mobile .bb-summary{display:none}
.device.mobile .cta{flex:1;justify-content:center}

/* focus visibility (a11y) */
.app :focus-visible,.audit-controls :focus-visible{outline:2.5px solid #2f6dd0;outline-offset:2px;border-radius:8px}

/* ---------- annotations ---------- */
.pin{position:absolute;z-index:20;width:25px;height:25px;border-radius:50%;background:var(--ink);color:#fff;border:2px solid #fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 12px -3px rgba(20,17,15,.6);transition:.16s;animation:pinPop .3s ease}
@keyframes pinPop{from{transform:scale(0)}to{transform:scale(1)}}
.pin:hover,.pin.active{background:#2f6dd0;transform:scale(1.12)}
.pin::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:1.5px solid var(--ink);opacity:.25}
.pin.active::after{border-color:#2f6dd0;opacity:.5}

.ann-panel{position:absolute;z-index:30;width:288px;background:var(--ink);color:#fff;border-radius:14px;padding:16px 17px 17px;
  box-shadow:0 24px 50px -18px rgba(20,17,15,.7);animation:pinPop .2s ease}
.ann-panel .an-no{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:#b9b09f;font-weight:600;margin:0 0 7px;display:flex;justify-content:space-between}
.ann-panel .an-no .scope{color:#8fb4f2}
.ann-panel h4{font-size:14px;font-weight:600;margin:0 0 7px;line-height:1.25}
.ann-panel .was{font-size:11.5px;color:#cdbfa6;line-height:1.5;margin:0 0 8px;padding-left:11px;border-left:2px solid #4a4039}
.ann-panel p{font-size:12.5px;color:#ece6db;line-height:1.55;margin:0}
.ann-panel .x{position:absolute;top:11px;right:11px;background:rgba(255,255,255,.1);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1}

/* principles legend */
.legend{max-width:1080px;margin:26px auto 0;padding:0 var(--pad)}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:14px}
.lg-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 17px}
.lg-card .lh{display:flex;align-items:center;gap:9px;margin:0 0 8px}
.lg-card .ic{width:30px;height:30px;border-radius:8px;background:var(--panel);display:flex;align-items:center;justify-content:center;flex:none}
.lg-card h5{font-size:12.5px;font-weight:600;margin:0;letter-spacing:.02em}
.lg-card p{font-size:12px;color:var(--ink-soft);line-height:1.5;margin:0}
.legend-title{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);font-weight:600;margin:0}

.ann-hide .pin{display:none}

@media (max-width:560px){
  .audit-top{flex-direction:column;align-items:flex-start}
  .geoms{grid-template-columns:1fr 1fr}
}

/* ===== Production embed overrides (auto-height / grow mode) =====
   The widget renders at natural height; the host page (browser window or
   Tilda parent) does the scrolling. So the shell must be flat and free of
   any overflow:hidden ancestor — otherwise the sticky preview / CTA can't
   pin. Loaded AFTER styles.css so these rules win. */

body { background: #fff; margin: 0; }
.embed { max-width: 1180px; margin: 0 auto; padding: 20px; }

.device { transition: none; }
.device.wide { max-width: 1120px; margin: 0 auto; }

/* flat shell — no bezel, and crucially overflow:visible so the page scroll
   (not a clipped inner box) drives position:sticky */
.app { border: none; border-radius: 0; box-shadow: none; overflow: visible; }

/* no internal panel scroll — content flows at natural height */
.panel { max-height: none; }
.notch { display: none !important; }
.bb-price { white-space: nowrap; }

/* wide: keep the bracelet preview in view while the long panel scrolls */
.device.wide .app-body { align-items: flex-start; }
.device.wide .stage { position: sticky; top: 0; align-self: flex-start; min-height: 440px; }

<script type="text/babel">
const { useState, useEffect } = React;
const Configurator = window.Configurator;

// Production embed: just the configurator, no audit chrome.
// Wide → stage left / panel right. Narrow → stacked, no phone frame.
function Embed() {
  const [compact, setCompact] = useState(window.innerWidth < 760);
  useEffect(() => {
    const onResize = () => setCompact(window.innerWidth < 760);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  return (
    <div className="embed">
      <div className={'device ' + (compact ? 'compact' : 'wide')}>
        <Configurator mode={compact ? 'mobile' : 'desktop'} annotate={false} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Embed />);

// ---- auto-height for Tilda iframe embed (matches tilda-embed.html) ----
(function () {
