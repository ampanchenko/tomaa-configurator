<!-- @dsCard group="Components" -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .ds{font-family:'Montserrat',-apple-system,Arial,sans-serif;padding:24px;color:#000}
  .summary{background:#f7f7f7;border:1px solid #ebebeb;border-radius:8px;padding:22px 24px;max-width:420px}
  .sum-title{font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px}
  .sum-rows{display:flex;flex-direction:column}
  .sum-row{display:flex;justify-content:space-between;align-items:baseline;gap:20px;padding:11px 0;border-bottom:1px solid #ebebeb;font-size:14px}
  .sum-row .k{color:#565656;flex:none}
  .sum-row .v{font-weight:600;text-align:right}
  .sum-price{border-bottom:none;padding-top:14px}
  .sum-price .k{align-self:center;text-transform:uppercase;letter-spacing:.08em;font-size:12px}
  .sum-price .v{font-size:22px}
  .cta{margin-top:18px;width:100%;cursor:pointer;border:none;border-radius:999px;background:#000;color:#fff;
    font-size:15px;font-weight:600;letter-spacing:.02em;padding:16px;display:inline-flex;align-items:center;justify-content:center;gap:10px}
  .note{font-size:12px;color:#888;margin:12px 2px 0;line-height:1.5;text-align:center}
</style>
<div class="ds">
  <section class="summary">
    <h2 class="sum-title">Итого</h2>
    <div class="sum-rows">
      <div class="sum-row"><span class="k">Тип</span><span class="v">Узкий · 10 мм</span></div>
      <div class="sum-row"><span class="k">Материал</span><span class="v">Кожа</span></div>
      <div class="sum-row"><span class="k">Цвет</span><span class="v">Южный чёрный</span></div>
      <div class="sum-row"><span class="k">Шармы</span><span class="v">Мягкая лапка (зол.), Клевер большой удачи (сер.)</span></div>
      <div class="sum-row sum-price"><span class="k">Цена</span><span class="v">4&nbsp;070&nbsp;₽</span></div>
    </div>
    <button class="cta">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>Добавить в корзину</span>
    </button>
    <p class="note">Цены предварительные — уточняются при оформлении.</p>
  </section>
</div>
