<!-- @dsCard group="Components" -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .ds{font-family:'Montserrat',-apple-system,Arial,sans-serif;padding:24px;color:#000}
  .ds .row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center}
  .ds .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#b6b6b6;font-weight:600;width:100%;margin-bottom:4px}
  .ds .chip{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #dcdcdc;border-radius:8px;
    padding:9px 14px;font:inherit;font-size:13px;font-weight:500;color:#000;line-height:1}
  .ds .chip.active{background:#000;border-color:#000;color:#fff}
  .ds .chip.pill{border-radius:999px;font-size:12.5px;padding:7px 13px;color:#565656}
  .ds .chip.pill.active{color:#fff}
  .ds .dot{width:15px;height:15px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.2)}
  .ds .dot.gold{background:radial-gradient(circle at 32% 28%,#e7c578,#b8893f 62%,#8a6322)}
  .ds svg{display:block}
</style>
<div class="ds">
  <div class="row"><span class="lab">Чип — выбор (обычный / активный)</span>
    <button class="chip">Кожа</button>
    <button class="chip active">Бархат</button>
  </div>
  <div class="row"><span class="lab">Чип с иконкой (тип основы)</span>
    <button class="chip"><svg width="26" height="15" viewBox="0 0 52 30" fill="currentColor"><rect x="2" y="12" width="48" height="6" rx="3"/></svg><span>Узкий · 10 мм</span></button>
    <button class="chip active"><svg width="26" height="15" viewBox="0 0 52 30" fill="currentColor"><rect x="2" y="7" width="48" height="5" rx="2.5"/><rect x="2" y="18" width="48" height="5" rx="2.5"/></svg><span>Узкий · 2 оборота</span></button>
  </div>
  <div class="row"><span class="lab">Чип со свотчем (покрытие)</span>
    <button class="chip active"><span class="dot gold"></span><span>Золото</span></button>
    <button class="chip"><span>Серебро</span></button>
  </div>
  <div class="row"><span class="lab">Чип-пилюля (категория)</span>
    <button class="chip pill active">Удача</button>
    <button class="chip pill">Животные</button>
    <button class="chip pill">Защита</button>
  </div>
</div>
