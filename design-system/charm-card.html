<!-- @dsCard group="Components" -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .ds{font-family:'Montserrat',-apple-system,Arial,sans-serif;padding:24px;color:#000}
  .ds .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#b6b6b6;font-weight:600;margin:0 0 12px}
  .ds .grid{display:grid;grid-template-columns:repeat(4,96px);gap:10px}
  .ds .card{background:#fff;border:1px solid #ebebeb;border-radius:8px;padding:8px 6px 7px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .ds .card.active{border-color:#000;box-shadow:0 0 0 1.5px #000 inset}
  .ds .card.soon{opacity:.6}
  .ds .card img{width:100%;aspect-ratio:1;object-fit:contain;display:block}
  .ds .card .n{font-size:11px;color:#565656;font-weight:500;text-align:center}
  .B{--b:https://ampanchenko.github.io/tomaa-configurator/assets/charms/preview}
</style>
<div class="ds">
  <p class="lab">Карточка шарма в палитре (обычная / активная / «скоро»)</p>
  <div class="grid">
    <div class="card"><img src="https://ampanchenko.github.io/tomaa-configurator/assets/charms/preview/gold/dragon.webp" alt=""><span class="n">Дракон благополучия</span></div>
    <div class="card active"><img src="https://ampanchenko.github.io/tomaa-configurator/assets/charms/preview/gold/clover.webp" alt=""><span class="n">Клевер большой удачи</span></div>
    <div class="card"><img src="https://ampanchenko.github.io/tomaa-configurator/assets/charms/preview/gold/horseshoe.webp" alt=""><span class="n">Сила подковы</span></div>
    <div class="card soon"><img src="https://ampanchenko.github.io/tomaa-configurator/assets/charms/preview/silver/dragon.webp" alt=""><span class="n">Дракон (серебро)</span></div>
  </div>
</div>
