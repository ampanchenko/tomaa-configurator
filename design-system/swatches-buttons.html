<!-- @dsCard group="Components" -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .ds{font-family:'Montserrat',-apple-system,Arial,sans-serif;padding:24px;color:#000}
  .ds .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#b6b6b6;font-weight:600;margin:0 0 10px}
  .ds .sws{display:flex;gap:9px;margin-bottom:22px}
  .ds .sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;box-shadow:inset 0 0 0 1px rgba(0,0,0,.18)}
  .ds .sw.active{border-color:#000}
  .ds .cta{cursor:pointer;border:none;border-radius:6px;background:#000;color:#fff;font:inherit;font-size:15px;font-weight:600;letter-spacing:.02em;padding:15px 40px}
  .ds .clear{border:none;background:none;font:inherit;font-size:12px;color:#b6b6b6;text-decoration:underline;cursor:pointer}
</style>
<div class="ds">
  <p class="lab">Свотчи цвета основы</p>
  <div class="sws">
    <span class="sw active" style="background:#1c1c1c"></span>
    <span class="sw" style="background:#4a3122"></span>
    <span class="sw" style="background:#5a2030"></span>
    <span class="sw" style="background:#8e2222"></span>
    <span class="sw" style="background:#d9b3a4"></span>
    <span class="sw" style="background:#e9e3d8"></span>
  </div>
  <p class="lab">Кнопки</p>
  <div style="display:flex;align-items:center;gap:20px">
    <button class="cta">Оформить заказ</button>
    <button class="clear">снять все</button>
  </div>
</div>
